<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Eastern Sierra Routes — Quinn Coyle</title>
  <link href="https://fonts.googleapis.com/css2?family=EB+Garamond:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
  <link href="https://api.mapbox.com/mapbox-gl-js/v3.3.0/mapbox-gl.css" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { height: 100%; font-family: 'EB Garamond', Georgia, serif; color: #1a1a1a; background: #f5f5f0; overflow: hidden; }

    #app { display: flex; height: 100vh; width: 100%; }
    #map { flex: 1; height: 100vh; }

    #sidebar {
      width: 340px; height: 100vh; background: #f5f5f0;
      display: flex; flex-direction: column;
      border-left: 1px solid rgba(0,0,0,0.08); overflow: hidden; flex-shrink: 0;
    }
    #sidebar-header { padding: 24px 24px 16px; border-bottom: 1px solid rgba(0,0,0,0.08); }
    #sidebar-header h1 { font-size: 1.35rem; font-weight: 600; letter-spacing: -0.01em; line-height: 1.2; }
    #sidebar-header .subtitle { font-size: 0.9rem; color: #888; margin-top: 3px; font-style: italic; }

    #filters { display: flex; gap: 6px; padding: 12px 24px; border-bottom: 1px solid rgba(0,0,0,0.08); }

    #sort-bar {
      display: flex; align-items: center; gap: 5px;
      padding: 8px 24px; border-bottom: 1px solid rgba(0,0,0,0.08);
    }
    #sort-bar .sort-label { font-size: 0.72rem; color: #aaa; text-transform: uppercase; letter-spacing: 0.07em; flex-shrink: 0; margin-right: 2px; }
    .sort-btn {
      padding: 4px 10px; border: 1.5px solid rgba(0,0,0,0.12);
      background: transparent; border-radius: 14px;
      font-family: 'EB Garamond', Georgia, serif; font-size: 0.8rem;
      cursor: pointer; color: #666; transition: all 0.15s ease;
    }
    .sort-btn:hover { border-color: rgba(0,0,0,0.3); color: #1a1a1a; }
    .sort-btn.active { background: #1a1a1a; border-color: #1a1a1a; color: #fff; }
    .filter-btn {
      flex: 1; padding: 6px 10px; border: 1.5px solid rgba(0,0,0,0.15);
      background: transparent; border-radius: 20px;
      font-family: 'EB Garamond', Georgia, serif; font-size: 0.88rem;
      cursor: pointer; color: #555; transition: all 0.15s ease;
    }
    .filter-btn:hover { border-color: rgba(0,0,0,0.35); color: #1a1a1a; }
    .filter-btn.active { background: #1a1a1a; border-color: #1a1a1a; color: #fff; }
    .filter-btn.ski.active { background: #4A90D9; border-color: #4A90D9; }
    .filter-btn.run.active { background: #E8623A; border-color: #E8623A; }

    #route-list { flex: 1; overflow-y: auto; padding: 4px 0; }
    #route-list::-webkit-scrollbar { width: 4px; }
    #route-list::-webkit-scrollbar-thumb { background: rgba(0,0,0,0.15); border-radius: 2px; }

    .route-item {
      padding: 11px 24px; cursor: pointer;
      border-bottom: 1px solid rgba(0,0,0,0.05);
      transition: background 0.12s ease; display: flex; align-items: flex-start; gap: 10px;
    }
    .route-item:hover { background: rgba(0,0,0,0.04); }
    .route-item.active { background: rgba(0,0,0,0.07); }
    .route-item.hidden { display: none; }

    .route-dot { width: 9px; height: 9px; border-radius: 50%; margin-top: 5px; flex-shrink: 0; }
    .route-dot.ski { background: #4A90D9; }
    .route-dot.run { background: #E8623A; }
    .route-info { flex: 1; min-width: 0; }
    .route-name { font-size: 0.95rem; font-weight: 600; color: #1a1a1a; line-height: 1.3; }
    .route-peak { font-size: 0.82rem; color: #666; margin-top: 1px; }
    .route-meta { font-size: 0.78rem; color: #999; margin-top: 2px; }
    .route-stars { color: #c8a020; font-size: 0.8rem; letter-spacing: -0.05em; }
    .route-consequence { font-size: 0.75rem; letter-spacing: -0.03em; }
    .route-consequence .skull-filled { color: #666; }
    .route-consequence .skull-empty { color: #ddd; }

    /* Detail panel */
    #detail-panel {
      border-top: 1px solid rgba(0,0,0,0.1); background: #eeeee9;
      padding: 16px 20px 18px; display: none; flex-direction: column; gap: 9px;
      max-height: 360px; overflow-y: auto; flex-shrink: 0;
    }
    #detail-panel.visible { display: flex; }
    #detail-panel::-webkit-scrollbar { width: 3px; }
    #detail-panel::-webkit-scrollbar-thumb { background: rgba(0,0,0,0.15); }

    #detail-header { position: relative; padding-right: 22px; }
    #detail-close {
      position: absolute; top: 0; right: 0; background: none; border: none;
      font-size: 1.1rem; cursor: pointer; color: #999; line-height: 1;
    }
    #detail-close:hover { color: #1a1a1a; }
    #detail-title { font-size: 1.05rem; font-weight: 600; line-height: 1.3; }
    #detail-peak { font-size: 0.88rem; color: #555; margin-top: 1px; }

    #detail-badges { display: flex; align-items: center; gap: 6px; flex-wrap: wrap; margin-top: 6px; }
    .type-badge {
      font-size: 0.72rem; padding: 2px 9px; border-radius: 12px;
      font-style: italic; color: #fff;
    }
    .type-badge.ski { background: #4A90D9; }
    .type-badge.run { background: #E8623A; }
    .badge-stars { font-size: 0.88rem; color: #c8a020; letter-spacing: -0.05em; }
    .badge-consequence {
      font-size: 0.72rem; padding: 2px 8px; border-radius: 12px;
      font-weight: 600; color: #fff;
    }
    .badge-consequence.c1 { background: #5aaa5a; }
    .badge-consequence.c2 { background: #e09020; }
    .badge-consequence.c3 { background: #cc3333; }

    #detail-stats {
      display: grid; grid-template-columns: 1fr 1fr; gap: 6px;
    }
    .stat-box { background: rgba(255,255,255,0.65); border-radius: 5px; padding: 7px 10px; }
    .stat-label { font-size: 0.68rem; text-transform: uppercase; letter-spacing: 0.05em; color: #999; }
    .stat-value { font-size: 0.98rem; font-weight: 600; color: #1a1a1a; margin-top: 1px; }

    #detail-meta { font-size: 0.83rem; color: #555; display: flex; flex-direction: column; gap: 3px; }
    .meta-row { display: flex; gap: 5px; }
    .meta-label { font-weight: 600; color: #444; flex-shrink: 0; }

    #detail-notes { font-size: 0.88rem; color: #555; font-style: italic; line-height: 1.55; }

    #back-link {
      position: fixed; top: 16px; left: 16px; z-index: 10;
      background: rgba(245,245,240,0.92); border: 1px solid rgba(0,0,0,0.12);
      border-radius: 20px; padding: 6px 14px 6px 10px;
      font-family: 'EB Garamond', Georgia, serif; font-size: 0.88rem;
      color: #555; text-decoration: none; display: flex; align-items: center; gap: 5px;
      backdrop-filter: blur(4px); transition: color 0.15s;
    }
    #back-link:hover { color: #1a1a1a; }

    @media (max-width: 640px) {
      #app { flex-direction: column; }
      #map { height: 38vh; flex: none; }
      #sidebar {
        width: 100%; height: 62vh; border-left: none;
        border-top: 1px solid rgba(0,0,0,0.08);
      }
      #sidebar-header { padding: 14px 16px 10px; }
      #sidebar-header h1 { font-size: 1.15rem; }

      /* Larger tap targets */
      .route-item { padding: 14px 16px; gap: 12px; }
      .route-name { font-size: 1rem; }
      .route-meta { font-size: 0.82rem; margin-top: 3px; }

      /* Touch-friendly filter / sort buttons */
      #filters { padding: 10px 16px; gap: 8px; }
      .filter-btn { padding: 9px 8px; font-size: 0.95rem; }
      #sort-bar { padding: 7px 16px; gap: 6px; }
      .sort-btn { padding: 6px 11px; font-size: 0.84rem; }

      /* Smooth iOS scroll */
      #route-list { -webkit-overflow-scrolling: touch; }

      /* Detail panel as bottom sheet over the map */
      #detail-panel {
        position: fixed; bottom: 0; left: 0; right: 0; z-index: 200;
        max-height: 65vh; border-radius: 16px 16px 0 0;
        box-shadow: 0 -4px 24px rgba(0,0,0,0.18);
        padding: 20px 20px 32px;
      }
      #detail-close {
        font-size: 1.5rem; padding: 4px 6px;
        top: -2px; right: -2px;
      }
      /* Drag handle visual hint */
      #detail-panel::before {
        content: ''; display: block; width: 36px; height: 4px;
        background: rgba(0,0,0,0.18); border-radius: 2px;
        margin: 0 auto 14px; flex-shrink: 0;
      }
      #detail-stats { grid-template-columns: 1fr 1fr; gap: 8px; }
      .stat-box { padding: 9px 12px; }
      .stat-value { font-size: 1.05rem; }
    }

</head>

      coords: [
        [-119.0723, 37.7828], [-119.0698, 37.7802], [-119.0672, 37.7778],
        [-119.0645, 37.7755], [-119.0618, 37.7733], [-119.0592, 37.7712],
        [-119.0568, 37.7692], [-119.0545, 37.7672], [-119.0522, 37.7652],

        [-119.0432, 37.7578]
      ]

  // ── MAP ────────────────────────────────────────────────────────────────────

  mapboxgl.accessToken = 'pk.eyJ1IjoicWNveWxlIiwiYSI6ImNrdXBydnF0ZDBscm4yeHBnZmkwdm15MmEifQ.xhgKU0DtBHlzyuwygiseOA';

  const map = new mapboxgl.Map({
    container: 'map',
    style: 'mapbox://styles/mapbox/outdoors-v12',
    center: [-118.85, 37.35],
    zoom: 8.2,
    pitch: 35,
    bearing: -10
  });

  map.addControl(new mapboxgl.NavigationControl({ visualizePitch: true }), 'top-left');
  map.addControl(new mapboxgl.ScaleControl({ unit: 'imperial' }), 'bottom-left');

  const SKI_COLOR = '#4A90D9';

  const RUN_COLOR = '#E8623A';
  const SKI_ACTIVE = '#1a6fc4';
  const RUN_ACTIVE = '#c94d23';

  let activeRouteId = null;
  let currentFilter = 'all';
  let currentSort = 'north-south';

  function parseDistance(dist) {
    if (!dist) return Infinity;
    const clean = dist.replace('¾', '.75').replace('½', '.5').replace('¼', '.25').replace('~', '');
    const match = clean.match(/[\d.]+/);
    return match ? parseFloat(match[0]) : Infinity;
  }

  function sortedRoutes() {
    const copy = [...ROUTES];
    if (currentSort === 'north-south') {
      copy.sort((a, b) => (b.dropIn ? b.dropIn[1] : 0) - (a.dropIn ? a.dropIn[1] : 0));
    } else if (currentSort === 'consequence') {
      copy.sort((a, b) => {
        const ac = a.consequence || 99, bc = b.consequence || 99;
        return ac - bc;
      });
    } else if (currentSort === 'length') {
      copy.sort((a, b) => parseDistance(a.distance) - parseDistance(b.distance));
    }
    return copy;
  }

  buildRouteList();

  map.on('load', () => {
    map.addSource('mapbox-dem', {
      type: 'raster-dem', url: 'mapbox://mapbox.mapbox-terrain-dem-v1',
      tileSize: 512, maxzoom: 14
    });
    map.setTerrain({ source: 'mapbox-dem', exaggeration: 1.5 });

    ROUTES.forEach(route => {
      const color = route.type === 'ski' ? SKI_COLOR : RUN_COLOR;

      map.addSource(route.id, {
        type: 'geojson',
        data: {
          type: 'Feature',
          properties: { id: route.id, type: route.type },
          geometry: { type: 'LineString', coordinates: route.coords }
        }
      });

      map.addLayer({
        id: route.id + '-casing', type: 'line', source: route.id,
        layout: { 'line-join': 'round', 'line-cap': 'round' },
        paint: { 'line-color': 'rgba(255,255,255,0.8)', 'line-width': 6, 'line-opacity': 0.9 }
      });
      map.addLayer({
        id: route.id + '-line', type: 'line', source: route.id,
        layout: { 'line-join': 'round', 'line-cap': 'round' },
        paint: { 'line-color': color, 'line-width': 3, 'line-opacity': 0.9 }
      });
      map.addLayer({
        id: route.id + '-hit', type: 'line', source: route.id,
        layout: { 'line-join': 'round', 'line-cap': 'round' },
        paint: { 'line-color': 'transparent', 'line-width': 20 }
      });

      // Drop-in marker for guidebook routes
      if (route.dropIn) {
        const el = document.createElement('div');
        el.style.cssText = `width:8px;height:8px;border-radius:50%;background:${color};
          border:2px solid rgba(255,255,255,0.9);cursor:pointer;`;
        el.addEventListener('click', () => selectRoute(route.id));
        new mapboxgl.Marker({ element: el })
          .setLngLat(route.dropIn)
          .addTo(map);
      }

      map.on('click', route.id + '-hit', () => selectRoute(route.id));
      map.on('mouseenter', route.id + '-hit', () => { map.getCanvas().style.cursor = 'pointer'; });
      map.on('mouseleave', route.id + '-hit', () => { map.getCanvas().style.cursor = ''; });
    });
  });

  // ── ROUTE LIST ─────────────────────────────────────────────────────────────

  function buildRouteList() {
    const list = document.getElementById('route-list');
    list.innerHTML = '';
    sortedRoutes().forEach(route => {
      const item = document.createElement('div');
      item.className = 'route-item';
      item.dataset.id = route.id;
      item.dataset.type = route.type;

      const s = Math.min(route.stars || 0, 4);
      const starsHTML = s
        ? `<span class="route-stars">${'★'.repeat(s)}${'☆'.repeat(4 - s)}</span> `
        : '';
      const consequenceHTML = route.consequence
        ? `<span class="route-consequence">${'<span class="skull-filled">☠</span>'.repeat(route.consequence)}${'<span class="skull-empty">☠</span>'.repeat(4 - route.consequence)}</span> · `
        : (route.stars ? ' · ' : '');
      const peakHTML = route.peak && route.peak !== route.name
        ? `<div class="route-peak">${route.peak}</div>` : '';

      const metaParts = [route.distance, route.gain ? route.gain + ' gain' : null,
        route.terrain].filter(Boolean);

      item.innerHTML = `
        <div class="route-dot ${route.type}"></div>
        <div class="route-info">
          <div class="route-name">${route.name}</div>
          ${peakHTML}
          <div class="route-meta">${starsHTML}${consequenceHTML}${metaParts.join(' · ')}</div>
        </div>`;
      item.addEventListener('click', () => selectRoute(route.id));
      list.appendChild(item);
    });
  }

  // ── SELECT / HIGHLIGHT ─────────────────────────────────────────────────────

  function selectRoute(id) {
    const route = ROUTES.find(r => r.id === id);
    if (!route) return;

    if (activeRouteId && activeRouteId !== id) {
      const prev = ROUTES.find(r => r.id === activeRouteId);
      if (prev) setLineStyle(prev, false);
      document.querySelectorAll('.route-item').forEach(el => el.classList.remove('active'));
    }

    if (activeRouteId === id) {
      setLineStyle(route, false);
      activeRouteId = null;
      document.querySelectorAll('.route-item').forEach(el => el.classList.remove('active'));
      document.getElementById('detail-panel').classList.remove('visible');
      return;
    }

    activeRouteId = id;
    setLineStyle(route, true);
    document.querySelectorAll('.route-item').forEach(el => {
      el.classList.toggle('active', el.dataset.id === id);
    });

    // Scroll list item into view
    const activeItem = document.querySelector(`.route-item[data-id="${id}"]`);
    if (activeItem) activeItem.scrollIntoView({ block: 'nearest', behavior: 'smooth' });

    const bounds = route.coords.reduce(
      (b, c) => b.extend(c),
      new mapboxgl.LngLatBounds(route.coords[0], route.coords[0])
    );
    const isMobile = window.innerWidth <= 640;
    try {
      map.fitBounds(bounds, {
        padding: isMobile
          ? { top: 60, bottom: 260, left: 20, right: 20 }
          : { top: 80, bottom: 80, left: 60, right: 380 },
        maxZoom: 13, duration: 800
      });
    } catch (e) { /* ignore fitBounds errors */ }

    showDetail(route);
  }

  function setLineStyle(route, active) {
    if (!map.getLayer(route.id + '-line')) return;
    const color = active
      ? (route.type === 'ski' ? SKI_ACTIVE : RUN_ACTIVE)
      : (route.type === 'ski' ? SKI_COLOR : RUN_COLOR);
    map.setPaintProperty(route.id + '-line', 'line-color', color);
    map.setPaintProperty(route.id + '-line', 'line-width', active ? 4.5 : 3);
    map.setPaintProperty(route.id + '-casing', 'line-width', active ? 8 : 6);
  }

  // ── DETAIL PANEL ───────────────────────────────────────────────────────────

  function showDetail(route) {
    document.getElementById('detail-title').textContent = route.name;
    const peakEl = document.getElementById('detail-peak');
    if (route.peak && route.peak !== route.name) {
      peakEl.textContent = route.peak;
      peakEl.style.display = 'block';
    } else {
      peakEl.style.display = 'none';
    }

    // Badges
    let badges = `<span class="type-badge ${route.type}">${route.type === 'ski' ? 'Backcountry Ski' : 'Trail Run'}</span>`;
    if (route.stars) badges += `<span class="badge-stars">${'★'.repeat(route.stars)}${'☆'.repeat(4 - route.stars)}</span>`;
    if (route.consequence) {
      badges += `<span class="badge-consequence c${route.consequence}">C${route.consequence}</span>`;
    }
    document.getElementById('detail-badges').innerHTML = badges;

    // Stats grid
    const stats = [
      ['Distance', route.distance],
      ['Total Gain', route.gain],
      route.time ? ['Est. Time', route.time] : null,
      route.summitElev ? ['Summit Elev', route.summitElev] : null,
      route.descentVert ? ['Descent Vert', route.descentVert] : null,
      (route.steepest && route.average) ? ['Max / Avg', `${route.steepest} / ${route.average}`] : null,
    ].filter(Boolean);

    document.getElementById('detail-stats').innerHTML = stats
      .map(([label, val]) => `<div class="stat-box"><div class="stat-label">${label}</div><div class="stat-value">${val}</div></div>`)
      .join('');

    // Meta
    const metaEl = document.getElementById('detail-meta');
    const metaRows = [
      route.terrain ? ['Terrain', route.terrain] : null,
      route.bestMonths ? ['Best', route.bestMonths] : null,
      route.gear ? ['Gear', route.gear] : null,
      route.trailhead ? ['Trailhead', route.trailhead] : null,
      (route.aspect && route.aspect !== '—') ? ['Aspect', route.aspect] : null,
    ].filter(Boolean);

    if (metaRows.length) {
      metaEl.innerHTML = metaRows
        .map(([label, val]) => `<div class="meta-row"><span class="meta-label">${label}:</span>${val}</div>`)
        .join('');
      metaEl.style.display = 'flex';
    } else {
      metaEl.style.display = 'none';
    }

    document.getElementById('detail-notes').textContent = route.notes || '';
    document.getElementById('detail-panel').classList.add('visible');
  }

  document.getElementById('detail-close').addEventListener('click', () => {
    document.getElementById('detail-panel').classList.remove('visible');
    if (activeRouteId) {
      const route = ROUTES.find(r => r.id === activeRouteId);
      if (route) setLineStyle(route, false);
      document.querySelectorAll('.route-item').forEach(el => el.classList.remove('active'));
      activeRouteId = null;
    }
  });

  // ── SORT ───────────────────────────────────────────────────────────────────

  document.querySelectorAll('.sort-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      currentSort = btn.dataset.sort;
      document.querySelectorAll('.sort-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      buildRouteList();
      // Re-apply current filter visibility
      document.querySelectorAll('.route-item').forEach(item => {
        item.classList.toggle('hidden', currentFilter !== 'all' && item.dataset.type !== currentFilter);
      });
    });
  });

  // ── FILTERS ────────────────────────────────────────────────────────────────

  document.querySelectorAll('.filter-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      currentFilter = btn.dataset.filter;
      document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');

      document.querySelectorAll('.route-item').forEach(item => {
        item.classList.toggle('hidden', currentFilter !== 'all' && item.dataset.type !== currentFilter);
      });

      ROUTES.forEach(route => {
        const vis = (currentFilter === 'all' || route.type === currentFilter) ? 'visible' : 'none';
        ['casing', 'line', 'hit'].forEach(s => {
          if (map.getLayer(route.id + '-' + s))
            map.setLayoutProperty(route.id + '-' + s, 'visibility', vis);
        });
      });

      if (activeRouteId) {
        const active = ROUTES.find(r => r.id === activeRouteId);
        if (active && currentFilter !== 'all' && active.type !== currentFilter) {
          setLineStyle(active, false);
          activeRouteId = null;
          document.querySelectorAll('.route-item').forEach(el => el.classList.remove('active'));
          document.getElementById('detail-panel').classList.remove('visible');
        }
      }
    });
  });
  </script>
